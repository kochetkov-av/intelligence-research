baseURL = "https://intelligence-research.pages.dev/"
languageCode = "ru"
title = "Факторы развития интеллекта"

[params]
  description = "Комплексный научный обзор факторов, влияющих на когнитивные способности"

[params.navbar]
  displayTitle = true
  displayLogo = false

[params.footer]
  displayPoweredBy = false

[params.page]
  width = "wide"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    endLevel = 3
    startLevel = 2

[module]
  [[module.imports]]
    path = "github.com/imfing/hextra"
  [[module.mounts]]
    source = "content"
    target = "content"
  [[module.mounts]]
    source = "research"
    target = "content/docs/research"
  [[module.mounts]]
    source = "analysis"
    target = "content/docs/analysis"
  [[module.mounts]]
    source = "output"
    target = "content/docs/output"
  [[module.mounts]]
    source = "sources"
    target = "content/docs/sources"
